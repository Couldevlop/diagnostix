name: Deploy — Build GHCR + Deploy Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:        # déclenchement manuel depuis GitHub UI

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nexus-diagnostix-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/nexus-diagnostix-frontend
  HELM_RELEASE: diagnostix
  HELM_NAMESPACE: diagnostix

jobs:
  # ============================================================
  # 1. Build & Push images vers GHCR
  # ============================================================
  build-push:
    name: Build & Push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # nécessaire pour pousser sur GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: echo "version=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,scope=backend-prod,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          build-args: |
            VITE_API_BASE_URL=/api/v1
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max

  # ============================================================
  # 2. Deploy sur Hetzner via Helm
  # ============================================================
  deploy:
    name: Deploy Hetzner K8s
    runs-on: ubuntu-latest
    needs: build-push
    environment: production   # protection de branche + approbation manuelle si configurée

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.31.0"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.16.4"

      # Configurer kubectl avec le kubeconfig du serveur Hetzner
      # Secret KUBECONFIG = contenu de ~/.kube/config sur le serveur
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Bitnami Helm repo
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Update Helm dependencies
        run: helm dependency update ./helm

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.HELM_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Secret pour puller les images GHCR depuis le cluster
      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=${{ env.HELM_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Générer values-secret.yaml depuis les GitHub Secrets
      - name: Generate values-secret.yaml
        run: |
          cat > /tmp/values-secret.yaml << 'VALEOF'
          postgresql:
            auth:
              password: "${{ secrets.POSTGRES_PASSWORD }}"

          secrets:
            postgresUser: nexus
            postgresPassword: "${{ secrets.POSTGRES_PASSWORD }}"
            postgresDb: nexus_diagnostix
            secretKey: "${{ secrets.SECRET_KEY }}"
            fieldEncryptionKey: "${{ secrets.FIELD_ENCRYPTION_KEY }}"
            pdfSigningSecret: "${{ secrets.PDF_SIGNING_SECRET }}"
            anthropicApiKey: "${{ secrets.ANTHROPIC_API_KEY }}"
            smtpUser: "${{ secrets.SMTP_USER }}"
            smtpPass: "${{ secrets.SMTP_PASS }}"
            smtpFrom: "${{ secrets.SMTP_FROM }}"
            initialAdminEmail: "${{ secrets.INITIAL_ADMIN_EMAIL }}"
            initialAdminPassword: "${{ secrets.INITIAL_ADMIN_PASSWORD }}"

          image:
            backend:
              tag: "${{ needs.build-push.outputs.image_tag }}"
            frontend:
              tag: "${{ needs.build-push.outputs.image_tag }}"
          VALEOF

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --values ./helm/values.yaml \
            --values ./helm/values-production.yaml \
            --values /tmp/values-secret.yaml \
            --wait \
            --timeout 15m \
            --atomic

      - name: Vérification déploiement
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.HELM_NAMESPACE }}
          echo "=== Services ==="
          kubectl get svc -n ${{ env.HELM_NAMESPACE }}
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.HELM_NAMESPACE }}
          echo "=== Certificats TLS ==="
          kubectl get certificate -n ${{ env.HELM_NAMESPACE }} || true
