# =============================================================================
# Overrides production — diagnostix.openlabconsulting.com
# Pas de secrets ici — utiliser values-secret.yaml
# =============================================================================

app:
  environment: production
  logLevel: INFO
  allowedOrigins: "https://diagnostix.openlabconsulting.com"

backend:
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 2000m
      memory: 2Gi

frontend:
  replicaCount: 1

ingress:
  enabled: true
  className: nginx
  host: diagnostix.openlabconsulting.com
  tls: true
  tlsSecretName: diagnostix-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"

postgresql:
  primary:
    persistence:
      size: 20Gi

redis:
  master:
    persistence:
      size: 4Gi
