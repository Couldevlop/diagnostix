{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nexus-diagnostix.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-diagnostix.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Toutes les routes /api/* → backend FastAPI
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "nexus-diagnostix.fullname" . }}-backend
                port:
                  number: {{ .Values.service.backend.port }}
          # Tout le reste → frontend React (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "nexus-diagnostix.fullname" . }}-frontend
                port:
                  number: {{ .Values.service.frontend.port }}
{{- end }}
