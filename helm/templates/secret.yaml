apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexus-diagnostix.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-diagnostix.labels" . | nindent 4 }}

type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | required "secrets.postgresPassword est requis" | quote }}

  # URL de connexion complète (asyncpg)
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s"
    .Values.secrets.postgresUser
    .Values.secrets.postgresPassword
    (include "nexus-diagnostix.postgresHost" .)
    .Values.secrets.postgresDb | quote }}

  # Redis (sans auth)
  REDIS_URL: {{ printf "redis://%s:6379/0" (include "nexus-diagnostix.redisHost" .) | quote }}

  # JWT & chiffrement
  SECRET_KEY: {{ .Values.secrets.secretKey | required "secrets.secretKey est requis" | quote }}
  FIELD_ENCRYPTION_KEY: {{ .Values.secrets.fieldEncryptionKey | required "secrets.fieldEncryptionKey est requis" | quote }}
  PDF_SIGNING_SECRET: {{ .Values.secrets.pdfSigningSecret | required "secrets.pdfSigningSecret est requis" | quote }}

  # Claude API
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}

  # Email
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | quote }}

  # Admin initial
  INITIAL_ADMIN_EMAIL: {{ .Values.secrets.initialAdminEmail | quote }}
  INITIAL_ADMIN_PASSWORD: {{ .Values.secrets.initialAdminPassword | required "secrets.initialAdminPassword est requis" | quote }}
