name: Build & Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Tag court
        id: tag
        run: echo "value=sha-$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/couldevlop/nexus-diagnostix-backend:latest
            ghcr.io/couldevlop/nexus-diagnostix-backend:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,scope=backend-prod,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          build-args: VITE_API_BASE_URL=/api/v1
          tags: |
            ghcr.io/couldevlop/nexus-diagnostix-frontend:latest
            ghcr.io/couldevlop/nexus-diagnostix-frontend:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max

      - name: Résumé
        run: |
          echo "### Images publiées" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/couldevlop/nexus-diagnostix-backend:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/couldevlop/nexus-diagnostix-frontend:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Déployer :** \`bash /opt/diagnostix/deploy.sh --tag ${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
