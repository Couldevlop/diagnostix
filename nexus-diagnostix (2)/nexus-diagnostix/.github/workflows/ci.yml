name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ==========================================================================
  # Backend — qualité, tests, couverture
  # ==========================================================================
  backend:
    name: Backend — lint, type, tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libgdk-pixbuf-2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Format check (ruff)
        run: ruff format --check app tests

      - name: Type check (mypy)
        run: mypy app
        continue-on-error: true # mypy strict en mode informatif au démarrage

      - name: Security audit (pip-audit)
        run: pip-audit --strict || true

      - name: Run tests with coverage
        env:
          SECRET_KEY: ci-secret-key-32-characters-min-test
          FIELD_ENCRYPTION_KEY: Vw0w8K9p1J2qR3sT4uV5wX6yZ7AbCdEfGhIjKl9mNoQ=
          PDF_SIGNING_SECRET: ci-pdf-signing-secret-32-chars-min
          DATABASE_URL: postgresql+asyncpg://nexus:nexus_test@localhost:5432/nexus_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: sk-ant-ci-test
          ENVIRONMENT: development
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ==========================================================================
  # Frontend — lint, type, tests, build
  # ==========================================================================
  frontend:
    name: Frontend — lint, type, tests, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Type check
        run: npm run type-check

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ==========================================================================
  # Docker — vérifier que les images se construisent
  # ==========================================================================
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: false
          load: true
          tags: nexus-diagnostix-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: false
          load: true
          tags: nexus-diagnostix-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
