apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nexus-diagnostix.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-diagnostix.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "nexus-diagnostix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              until nc -z {{ include "nexus-diagnostix.postgresHost" . }} 5432; do
                echo "En attente de PostgreSQL..."; sleep 3
              done
              echo "PostgreSQL prêt."
      containers:
        - name: migrate
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "=== Migrations Alembic ==="
              alembic upgrade head
              echo "=== Seed données initiales ==="
              python alembic/seeds/initial_data.py
              echo "=== Migration terminée ==="
          envFrom:
            - configMapRef:
                name: {{ include "nexus-diagnostix.configmapName" . }}
            - secretRef:
                name: {{ include "nexus-diagnostix.secretName" . }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
