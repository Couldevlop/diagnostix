name: Build & Push Images → GHCR

# Ce workflow NE déploie PAS — il build et publie les images.
# Le déploiement est déclenché depuis le serveur via deploy.sh
# Zéro secret GitHub nécessaire (GITHUB_TOKEN est automatique).

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/couldevlop/nexus-diagnostix-backend
  FRONTEND_IMAGE: ghcr.io/couldevlop/nexus-diagnostix-frontend

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # pour pousser sur GHCR avec GITHUB_TOKEN automatique

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR (token automatique)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag court
        id: tag
        run: echo "value=sha-$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Build & Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,scope=backend-prod,mode=max

      - name: Build & Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: true
          build-args: |
            VITE_API_BASE_URL=/api/v1
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=frontend-prod
          cache-to: type=gha,scope=frontend-prod,mode=max

      - name: Résumé
        run: |
          echo "### Images publiées" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Déployer sur le serveur :**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "bash /opt/diagnostix/deploy.sh --tag ${{ steps.tag.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
