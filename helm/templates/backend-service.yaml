apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-diagnostix.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexus-diagnostix.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.backend.type }}
  selector:
    {{- include "nexus-diagnostix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.service.backend.port }}
      targetPort: http
      protocol: TCP
